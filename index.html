<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="img/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/logo.png">
    <link rel="apple-touch-icon" href="img/logo.png">
    <meta property="og:title" content="Camisetas - A Escolha">

    <meta property="og:image" content="https://aescolha.netlify.app/img/capa_2.jpg">
    <meta property="og:url" content="https://aescolha.netlify.app/">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">

    <title>Camisetas - A Escolha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #050a12; color: #f0f4f8; margin: 0; overflow-x: hidden; width: 100%; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-mono { font-family: 'Space Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        ::selection { background-color: #3385ff; color: white; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .overlay-fade { animation: overlayFade 0.3s ease-out forwards; }
        @keyframes overlayFade { from { opacity: 0; } to { opacity: 1; } }
        .zoom-content { transition: transform 0.3s ease; }
        .design-img-wrapper { position: relative; }
        .design-img-wrapper::before {
            content: 'ESTAMPA';
            position: absolute;
            top: -10px;
            left: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #3385ff;
            background: #0a1428;
            padding: 0 6px;
            z-index: 10;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { deep: '#050a12', dark: '#0a1428', main: '#002b5c' },
                        accent: '#3385ff',
                        gold: '#e2b96a'
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzd3GMK6N6MtVCP2dooD1ONrn40LK5jmmlUbW6cmCwJGfBj-perg6XWD7cDf2ayQjs6/exec";

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const NAME_TRANSLATION = {
            '1_reis': '1 Reis 19', 'escolha_obedecer_estonada': 'Escolha Obedecer',
            'escolha_um_lado': 'Escolha Um Lado', 'every_day_is_a_deciosion': 'Every Day is a Decision',
            'if_the_lord_is_god': 'If the Lord is God', 'o_deus_que_sustenta': 'O Deus que Sustenta',
            'o_proximo': 'O Próximo?', 'o_que_fazeis_aqui_estonada': 'O Que Fazes Aqui?',
            'obedeca_o_chamado': 'Obedeça o Chamado', 'quem_vem_depois': 'Quem Vem Depois?',
            'saia_de_cima_do_muro': 'Saia de Cima do Muro', 'who_is_next_estonada': 'Who is Next?'
        };

        const SHIRT_FILES = [
      '1_reis_azul.jpeg','1_reis_branco.jpeg', '1_reis_preto.jpeg', '1_reis_roxo.jpeg', '1_reis_verde.jpeg',
      'escolha_obedecer_estonada_preto.jpeg', 'escolha_um_lado_offwhite.jpeg', 'escolha_um_lado_preto.jpeg',
            'every_day_is_a_deciosion_azul.jpeg', 'every_day_is_a_deciosion_bege.jpeg', 'every_day_is_a_deciosion_marrom.jpeg',
            'every_day_is_a_deciosion_offwhite.jpeg', 'every_day_is_a_deciosion_preto.jpeg', 'every_day_is_a_deciosion_roxo.jpeg',
           'every_day_is_a_deciosion_verde.jpeg', 'if_the_lord_is_god_offwhite.jpeg', 'o_deus_que_sustenta_bege.jpeg',
            'o_proximo_azul.jpeg', 'o_proximo_marrom.jpeg', 'o_proximo_offwhite.jpeg', 'o_proximo_preto.jpeg', 'o_proximo_verde.jpeg',
            'o_que_fazeis_aqui_estonada_preto.jpeg', 'obedeca_o_chamado_offwhite.jpeg', 'obedeca_o_chamado_preto.jpeg',
            'quem_vem_depois_offwhite.jpeg', 'saia_de_cima_do_muro_offwhite.jpeg', 'who_is_next_estonada_preto.jpeg'
        ];

        const HEX_COLORS = {
            'preto': '#111', 'branco': '#fff', 'azul': '#002b5c', 'roxo': '#5c35b0',
            'verde': '#1b4d3e', 'offwhite': '#f5f5f0', 'bege': '#d2b48c', 'marrom': '#4b3621'
        };

        const MP_LINKS = {
            1: "https://mpago.la/1m71FiX", 2: "https://mpago.la/2xCKdZ7", 3: "https://mpago.la/1Epq5G1",
            4: "https://mpago.la/2bCAh2g", 5: "https://mpago.la/1GcS4Xw", 6: "https://mpago.la/12fY57p",
            7: "https://mpago.la/1kkodB1", 8: "https://mpago.la/2qWh34v", 9: "https://mpago.la/1mDZQkx",
            10: "https://mpago.la/1q7sxky"
        };

        function App() {
            const [products, setProducts] = useState({});
            const [cart, setCart] = useState([]);
            const [activeBanner, setActiveBanner] = useState(0);
            const banners = ["img/capa.jpeg", "img/capa_2.jpg"];

            useEffect(() => {
                const interval = setInterval(() => {
                    setActiveBanner(prev => (prev + 1) % banners.length);
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            const [touchStart, setTouchStart] = useState(null);
            const handleTouchStart = (e) => { setTouchStart(e.touches[0].clientX); };
            const handleTouchEnd = (e) => {
                if (!touchStart) return;
                const diff = touchStart - e.changedTouches[0].clientX;
                if (diff > 50) setActiveBanner(prev => (prev + 1) % banners.length);
                else if (diff < -50) setActiveBanner(prev => (prev - 1 + banners.length) % banners.length);
            };

            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedSize, setSelectedSize] = useState('');
            const [activeImgIdx, setActiveImgIdx] = useState(0);
            const [currentModalImages, setCurrentModalImages] = useState([]);
            const [isAdminLoginOpen, setIsAdminLoginOpen] = useState(false);
            const [isAdminPanelOpen, setIsAdminPanelOpen] = useState(false);
            const [adminUser, setAdminUser] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [orders, setOrders] = useState([]);
            const [customerInfo, setCustomerInfo] = useState({ n: '', ph: '', em: '' });
            const [checkoutError, setCheckoutError] = useState('');
             const [isProcessing, setIsProcessing] = useState(false);
             const [invalidFields, setInvalidFields] = useState({ n: false, ph: false, em: false });
            const [zoomedImg, setZoomedImg] = useState(null);
            const [designImgError, setDesignImgError] = useState(false);

            useEffect(() => {
                const handlePopState = () => {
                    setIsCartOpen(false);
                    setSelectedProduct(null);
                    setIsAdminLoginOpen(false);
                    setIsAdminPanelOpen(false);
                    setZoomedImg(null);
                    document.body.style.overflow = 'auto';
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const closeModal = () => {
                if (window.history.state && window.history.state.modal) {
                    window.history.back();
                } else {
                    setIsCartOpen(false);
                    setSelectedProduct(null);
                    setIsAdminLoginOpen(false);
                    setIsAdminPanelOpen(false);
                    setZoomedImg(null);
                    document.body.style.overflow = 'auto';
                }
            };

            useEffect(() => {
                const processed = {};
                SHIRT_FILES.forEach(file => {
                    const parts = file.replace('.jpeg', '').split('_');
                    const color = parts.pop() || 'padrao';
                    const slug = parts.join('_');
                    if (!processed[slug]) {
                        processed[slug] = { id: slug, name: NAME_TRANSLATION[slug] || slug.replace(/_/g, ' ').toUpperCase(), variants: [] };
                    }
                    processed[slug].variants.push({ color, img: `img/${file}` });
                });
                setProducts(processed);
                const savedOrders = localStorage.getItem('camp_orders');
                if (savedOrders) setOrders(JSON.parse(savedOrders));
            }, []);

            const openProductModal = (product) => {
                window.history.pushState({ modal: 'product' }, '');
                setSelectedProduct(product);
                const images = product.variants.map(v => v.img);
                setCurrentModalImages(images);
                setActiveImgIdx(0);
                setSelectedSize('');
                setCheckoutError('');
                setDesignImgError(false);
                document.body.style.overflow = 'hidden';
            };

            const addToCart = () => {
                if (!selectedSize) { setCheckoutError('Por favor, selecione um tamanho.'); return; }
                const activeImg = currentModalImages[activeImgIdx];
                const colorName = selectedProduct.variants.find(v => v.img === activeImg)?.color || "Padrão";
                const newItem = { id: `${selectedProduct.id}-${Date.now()}`, name: selectedProduct.name, size: selectedSize, color: colorName.toUpperCase(), img: activeImg, price: 85 };
                setCart([...cart, newItem]);
                closeModal();
                setTimeout(() => {
                    window.history.pushState({ modal: 'cart' }, '');
                    setIsCartOpen(true);
                }, 100);
            };

             // Valida se tem pelo menos duas palavras (Nome e Sobrenome) com no mínimo 2 letras cada
  const validateName = (name) => {
    return /^[a-zA-ZÀ-ÿ]{2,}\s+[a-zA-ZÀ-ÿ]{2,}/.test(name.trim());
  };

  // Remove caracteres especiais e checa se tem 11 números e se o DDD é seguido de 9
  const validatePhone = (phone) => {
    const numbers = phone.replace(/\D/g, '');
    return numbers.length === 11 && numbers[2] === '9';
  };

  // Validação padrão de e-mail (tem que ter @ e ponto)
  const validateEmail = (email) => {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  };

   const handleCheckout = async () => {
    // Limpa os erros ao tentar de novo
    setCheckoutError(''); 
    setInvalidFields({ n: false, ph: false, em: false });

    let hasError = false;
    const newInvalidFields = { n: false, ph: false, em: false };

    if (cart.length === 0) {
      setCheckoutError('Seu carrinho está vazio.'); 
      return;
    }
    
    // Checa cada campo e marca de vermelho se estiver errado
    if (!validateName(customerInfo.n)) {
      newInvalidFields.n = true;
      setCheckoutError('Por favor, insira Nome e Sobrenome.'); 
      hasError = true;
    } else if (!validatePhone(customerInfo.ph)) {
      newInvalidFields.ph = true;
      setCheckoutError('Insira um celular válido com DDD (Ex: 11988887777).'); 
      hasError = true;
    } else if (!validateEmail(customerInfo.em)) {
      newInvalidFields.em = true;
      setCheckoutError('Por favor, insira um e-mail válido.'); 
      hasError = true;
    }

    // Se achou erro, para tudo e atualiza a tela
    if (hasError) {
      setInvalidFields(newInvalidFields);
      return;
    }

    setIsProcessing(true);

    const dateStr = new Date().toLocaleString('pt-BR');
    const newOrder = {
      id: Date.now(),
      date: dateStr,
      customer: customerInfo,
      items: [...cart],
      total: cart.length * 85,
      paid: false
    };

    const updatedOrders = [newOrder, ...orders];
    setOrders(updatedOrders);
    localStorage.setItem('camp_orders', JSON.stringify(updatedOrders));

    if (APPS_SCRIPT_URL) {
      const payload = {
        data: dateStr,
        nome: customerInfo.n,
        telefone: customerInfo.ph,
        email: customerInfo.em,
        total_pedido: cart.length * 85,
        itens: cart.map(item => ({
          camiseta: item.name,
          cor: item.color,
          tamanho: item.size,
          preco: 85
        }))
      };

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
      } catch (e) {
        console.error("Erro ao enviar para o Sheets:", e);
      }
    }

    const link = MP_LINKS[cart.length] || MP_LINKS[10];
    window.location.href = link;
  };

            const toggleOrderPaid = (orderId) => {
                const updated = orders.map(o => o.id === orderId ? { ...o, paid: !o.paid } : o);
                setOrders(updated);
                localStorage.setItem('camp_orders', JSON.stringify(updated));
            };

            const deleteOrder = (orderId) => {
                if (window.confirm('Excluir este pedido permanentemente?')) {
                    const updated = orders.filter(o => o.id !== orderId);
                    setOrders(updated);
                    localStorage.setItem('camp_orders', JSON.stringify(updated));
                }
            };

            return (
                <div className="min-h-screen flex flex-col w-full pt-[80px] md:pt-[100px]">
                    <nav className="fixed top-0 w-full z-[1000] bg-[#050a12]/95 backdrop-blur-md border-b border-[#3385ff]/20 flex justify-between items-center px-4 md:px-[5%] py-3">
                        <img src="img/logo.png" alt="Logo" className="h-8 md:h-10 object-contain" />
                        <div className="flex items-center gap-2 md:gap-4">
                            <a href="https://forms.gle/wp5moxciPJVzhBx7A" target="_blank" className="bg-[#e2b96a] text-black px-3 py-1.5 md:px-4 md:py-2 rounded-md font-mono text-[9px] md:text-[10px] font-bold hover:brightness-110 transition-all uppercase">INSCREVA-SE NO ACAMPA</a>
                            <button onClick={() => { window.history.pushState({ modal: 'cart' }, ''); setIsCartOpen(true); }} className="bg-[#3385ff]/10 border border-[#3385ff] text-white px-3 py-1.5 md:px-4 md:py-2 rounded-md font-mono text-xs md:text-sm flex items-center gap-2">
                                <Icon name="shopping-cart" size={16} />
                                <span>({cart.length})</span>
                            </button>
                        </div>
                    </nav>

                    <section className="w-full overflow-hidden relative" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        <div className="relative w-full aspect-[16/9] bg-black overflow-hidden">
                            {banners.map((banner, index) => (
                                <img key={index} src={banner} className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-700 ${index === activeBanner ? "opacity-100" : "opacity-0"}`} />
                            ))}
                        </div>
                        <button onClick={() => setActiveBanner(prev => (prev - 1 + banners.length) % banners.length)} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full">‹</button>
                        <button onClick={() => setActiveBanner(prev => (prev + 1) % banners.length)} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full">›</button>
                        <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                            {banners.map((_, index) => (
                                <div key={index} onClick={() => setActiveBanner(index)} className={`w-3 h-3 rounded-full cursor-pointer ${index === activeBanner ? "bg-white" : "bg-white/40"}`} />
                            ))}
                        </div>
                    </section>

                    <main className="max-w-[1400px] mx-auto px-4 md:px-6 py-8 flex-1 w-full">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                            {Object.values(products).map((product) => (
                                <div key={product.id} onClick={() => openProductModal(product)} className="bg-[#0a1428] border border-[#3385ff]/20 rounded-xl overflow-hidden cursor-pointer group transition-all hover:-translate-y-2">
                                    <div className="aspect-square relative overflow-hidden">
                                        <img src={product.variants[0].img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute top-3 right-3 bg-[#3385ff] text-black font-mono text-[10px] font-bold px-2 py-1 rounded">
                                            {product.id === '1_reis' ? 'OVERSIZED' : 'OVERSIZED'}
                                        </div>
                                    </div>
                                    <div className="p-5 text-center">
                                        <h3 className="font-bebas text-2xl tracking-wide">{product.name}</h3>
                                        <p className="text-[#3385ff] font-mono mt-1">R$ 85,00</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selectedProduct && (
                        <div className="fixed inset-0 z-[2000] flex items-center justify-center p-2 md:p-4 bg-black/90 backdrop-blur-sm overlay-fade">
                            <div className="bg-[#0a1428] w-full max-w-6xl rounded-2xl border border-[#3385ff]/20 overflow-hidden flex flex-col md:grid md:grid-cols-[1.3fr_1fr] max-h-[95vh] md:max-h-[90vh] fade-in shadow-2xl">
                                <div className="bg-black relative flex flex-col md:flex-row h-[320px] md:h-full shrink-0 overflow-hidden">
                                    <div className="flex md:flex-col gap-2 overflow-x-auto md:overflow-y-auto p-3 bg-black/50 scrollbar-hide border-t md:border-t-0 md:border-r border-white/5 order-2 md:order-1 md:w-24 shrink-0">
                                        {currentModalImages.map((img, i) => (
                                            <img key={i} src={img} onClick={() => setActiveImgIdx(i)} className={`w-12 h-12 md:w-16 md:h-16 object-cover rounded cursor-pointer transition-all shrink-0 ${i === activeImgIdx ? 'ring-2 ring-[#3385ff] opacity-100' : 'opacity-40 hover:opacity-60'}`} />
                                        ))}
                                    </div>
                                    <div className="flex-1 flex items-center justify-center p-4 overflow-hidden order-1 md:order-2 relative group">
                                        <img src={currentModalImages[activeImgIdx]} className="max-w-full max-h-full object-contain" alt="Preview" />
                                        <button onClick={() => { window.history.pushState({ modal: 'zoom' }, ''); setZoomedImg(currentModalImages[activeImgIdx]); }} className="absolute bottom-4 right-4 bg-white/10 hover:bg-white/20 text-white p-3 rounded-full backdrop-blur-md border border-white/10 transition-colors">
                                            <Icon name="zoom-in" size={20} />
                                        </button>
                                    </div>
                                    <button onClick={closeModal} className="absolute top-4 right-4 md:hidden bg-black/50 text-white p-2 rounded-full z-10"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-6 md:p-10 flex flex-col gap-6 overflow-y-auto scrollbar-hide bg-[#0a1428]">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <div className="flex items-center gap-3">
                                                <h2 className="font-bebas text-3xl md:text-5xl tracking-wide">{selectedProduct.name}</h2>
                                                <span className="bg-[#3385ff] text-black font-mono text-[9px] md:text-[10px] font-bold px-2 py-1 rounded">{selectedProduct.id === '1_reis' ? 'OVERSIZED' : 'OVERSIZED'}</span>
                                            </div>
                                            <p className="text-xl md:text-3xl text-[#3385ff] font-bebas mt-1">R$ 85,00</p>
                                        </div>
                                        <button onClick={closeModal} className="hidden md:block text-white/60 hover:text-white"><Icon name="x" size={32} /></button>
                                    </div>

                                    {/* === INÍCIO DA ARTE DA ESTAMPA === */}
<div className="mb-6">
  <p className="text-[10px] text-[#62768d] font-mono mb-3 uppercase tracking-widest">
    Arte Original da Estampa
  </p>
  
  <div 
    className="relative border border-[#3385ff]/20 rounded-xl overflow-hidden bg-[#050a12] aspect-[3/4] flex items-center justify-center cursor-pointer group"
    onClick={() => { 
      window.history.pushState({ modal: 'zoom' }, ''); 
      setZoomedImg(`img/${selectedProduct.id}_design.jpeg`); 
    }}
  >
    {/* A imagem carrega aqui. O 'object-contain' garante que ela NUNCA seja cortada */}
    <img 
      src={`img/${selectedProduct.id}_design.jpeg`} 
      alt={`Arte da estampa ${selectedProduct.name}`} 
      className="w-full h-full object-contain p-2 transition-transform duration-500 group-hover:scale-105"
    />
    
    {/* Efeito que escurece e mostra o botão de Zoom quando passa o dedo/mouse */}
    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm">
      <div className="bg-[#3385ff] text-black rounded-full p-4 flex flex-col items-center gap-1 shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-transform">
        <Icon name="zoom-in" size={24} />
        <span className="font-mono text-[10px] font-bold">AMPLIAR ARTE</span>
      </div>
    </div>
  </div>
</div>
{/* === FIM DA ARTE DA ESTAMPA === */}
                                    <div className="bg-white/5 p-5 rounded-xl border border-white/10 font-mono text-[12px] md:text-[13px] text-gray-400">
                                        <p className="text-[#3385ff] font-bold uppercase mb-3 tracking-widest text-[10px]">Tabela de Medidas</p>
                                        {selectedProduct.id === '1_reis' ? (
                                            <div className="space-y-1">
                                                <p><strong>P:</strong> A 79 | B 67 | C 23</p>
                                                <p><strong>M:</strong> A 80 | B 69 | C 24</p>
                                                <p><strong>G:</strong> A 82 | B 72 | C 25</p>
                                                <p><strong>GG:</strong> A 84 | B 74 | C 26</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-1">
                                                <p><strong>P:</strong> A 79 | B 67 | C 23</p>
                                                <p><strong>M:</strong> A 80 | B 69 | C 24</p>
                                                <p><strong>G:</strong> A 82 | B 72 | C 25</p>
                                                <p><strong>GG:</strong> A 84 | B 74 | C 26</p>
                                            </div>
                                        )}
                                    </div>

                                    <div>
                                        <p className="text-[10px] text-[#62768d] font-mono mb-3 uppercase tracking-widest">Cores Disponíveis</p>
                                        <div className="flex flex-wrap gap-3">
                                            {selectedProduct.variants.map((v, i) => (
                                                <button key={i} onClick={() => { const idx = currentModalImages.indexOf(v.img); if (idx !== -1) setActiveImgIdx(idx); }} className={`w-9 h-9 rounded-full border-2 transition-all ${currentModalImages[activeImgIdx] === v.img ? 'border-white scale-110 shadow-lg' : 'border-transparent opacity-60 hover:opacity-100'}`} style={{ backgroundColor: HEX_COLORS[v.color] || '#777' }} />
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <p className="text-[10px] text-[#62768d] font-mono mb-3 uppercase tracking-widest">Tamanho</p>
                                        <div className="grid grid-cols-4 gap-3">
                                            {['P', 'M', 'G', 'GG'].map(size => (
                                                <button key={size} onClick={() => setSelectedSize(size)} className={`py-4 rounded-lg border font-mono text-sm transition-all ${selectedSize === size ? 'bg-[#3385ff] border-[#3385ff] text-black font-bold' : 'bg-transparent border-[#3385ff]/20 text-white hover:border-[#3385ff]'}`}>{size}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {checkoutError && <p className="text-red-400 font-mono text-xs">{checkoutError}</p>}
                                    <button onClick={addToCart} className="w-full bg-[#3385ff] text-black py-5 rounded-xl font-bebas text-3xl font-bold hover:brightness-110 mt-auto">ADICIONAR AO CARRINHO</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {zoomedImg && (
                        <div className="fixed inset-0 z-[8000] bg-black/95 flex items-center justify-center p-4 overflow-auto overlay-fade cursor-zoom-out" onClick={closeModal}>
                            <img src={zoomedImg} className="max-w-none w-auto max-w-[95vw] h-auto max-h-[95vh] zoom-content object-contain" alt="Zoom" onClick={(e) => e.stopPropagation()} />
                            <button onClick={(e) => { e.stopPropagation(); closeModal(); }} className="fixed top-6 right-6 bg-white/10 hover:bg-[#3385ff] text-white p-4 rounded-full backdrop-blur-md shadow-2xl transition-all border border-white/20 group z-50 cursor-pointer">
                                <Icon name="x" size={24} className="group-hover:text-black transition-colors" />
                            </button>
                        </div>
                    )}

                    {isCartOpen && (
                        <>
                            <div className="fixed inset-0 bg-black/60 z-[2999] overlay-fade" onClick={closeModal} />
                            <div className="fixed right-0 top-0 h-full w-full max-w-md bg-[#0a1428] z-[3000] border-l border-[#3385ff]/20 p-6 flex flex-col slide-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="font-bebas text-3xl tracking-wide">SEU CARRINHO</h2>
                                    <button onClick={closeModal}><Icon name="x" size={24} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-4 scrollbar-hide">
                                    {cart.length === 0 ? <div className="text-center py-20 opacity-20"><Icon name="shopping-cart" size={48} /></div> : cart.map(item => (
                                        <div key={item.id} className="flex gap-4 items-center bg-white/5 p-3 rounded-lg border border-white/5">
                                            <img src={item.img} className="w-16 h-16 object-cover rounded shadow-lg" />
                                            <div className="flex-1">
                                                <p className="font-bold text-sm truncate">{item.name}</p>
                                                <p className="text-[10px] text-[#3385ff] font-mono">{item.color} • TAM: {item.size}</p>
                                                <p className="text-xs font-bold mt-1">R$ 85,00</p>
                                            </div>
                                            <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="text-red-400/60 hover:text-red-500"><Icon name="x" size={18} /></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-6 space-y-4 pt-6 border-t border-white/10">
  
  {/* Inputs com mudança de cor dinâmica (Vermelho se der erro) */}
  <input type="text" placeholder="Nome e Sobrenome" 
    className={`w-full bg-white/5 border p-3 rounded text-sm outline-none transition-colors ${invalidFields.n ? 'border-red-500 bg-red-500/10 text-red-100 placeholder-red-300' : 'border-[#3385ff]/20'}`} 
    value={customerInfo.n} 
    onChange={e => { setCustomerInfo({...customerInfo, n: e.target.value}); setInvalidFields({...invalidFields, n: false}); }} 
  />

  <input type="tel" placeholder="WhatsApp (com DDD)" 
    className={`w-full bg-white/5 border p-3 rounded text-sm outline-none transition-colors ${invalidFields.ph ? 'border-red-500 bg-red-500/10 text-red-100 placeholder-red-300' : 'border-[#3385ff]/20'}`} 
    value={customerInfo.ph} 
    onChange={e => { setCustomerInfo({...customerInfo, ph: e.target.value}); setInvalidFields({...invalidFields, ph: false}); }} 
  />

  <input type="email" placeholder="E-mail" 
    className={`w-full bg-white/5 border p-3 rounded text-sm outline-none transition-colors ${invalidFields.em ? 'border-red-500 bg-red-500/10 text-red-100 placeholder-red-300' : 'border-[#3385ff]/20'}`} 
    value={customerInfo.em} 
    onChange={e => { setCustomerInfo({...customerInfo, em: e.target.value}); setInvalidFields({...invalidFields, em: false}); }} 
  />

  {/* Aviso de Frete / Entrega */}
  <div className="bg-[#3385ff]/10 border border-[#3385ff]/30 p-3 rounded-lg flex items-start gap-3 mt-4 mb-4">
    <Icon name="truck" size={20} className="text-[#3385ff] shrink-0 mt-0.5" />
    <p className="text-[11px] md:text-xs text-gray-300 font-mono leading-relaxed">
      <strong className="text-[#3385ff]">ENTREGA:</strong> As camisetas serão entregues no dia da saída para o acampamento. Se você não for ao acampamento, entre em contato com nosso atendimento para agendar a retirada.
    </p>
  </div>

  {/* Mensagem de Erro Vermelha (Se houver) */}
  {checkoutError && (
    <p className="text-red-400 font-mono text-xs text-center bg-red-500/10 p-2 rounded border border-red-500/20">
      {checkoutError}
    </p>
  )}

  <div className="flex justify-between items-center font-bebas text-3xl">
    <span>TOTAL:</span>
    <span className="text-[#3385ff]">R$ {cart.length * 85},00</span>
  </div>

  {/* Botão de Finalizar Compra com Loading */}
  <button 
    onClick={handleCheckout} 
    disabled={isProcessing}
    className={`w-full py-4 rounded-lg font-bebas text-2xl font-bold flex justify-center items-center gap-2 transition-all ${
      isProcessing 
        ? 'bg-gray-600 text-gray-400 cursor-not-allowed' 
        : 'bg-[#3385ff] text-black hover:brightness-110'
    }`}
  >
    {isProcessing ? (
      <>
        <Icon name="loader-2" className="animate-spin" size={24} />
        PROCESSANDO...
      </>
    ) : (
      'FINALIZAR COMPRA'
    )}
  </button>
</div>
                            </div>
                        </>
                    )}

                    {isAdminPanelOpen && (
                        <div className="fixed inset-0 z-[7000] bg-[#f4f7f6] text-black p-4 md:p-8 overflow-y-auto overlay-fade">
                            <div className="max-w-5xl mx-auto">
                                <div className="flex justify-between items-center mb-10 border-b pb-6">
                                    <h1 className="text-4xl font-bebas tracking-tight">PEDIDOS RECEBIDOS</h1>
                                    <button onClick={closeModal} className="bg-black text-white px-6 py-2 rounded font-mono text-xs font-bold">FECHAR PAINEL</button>
                                </div>
                                <div className="space-y-6">
                                    {orders.map(order => (
                                        <div key={order.id} className={`bg-white p-6 rounded-xl shadow-sm border-l-8 ${order.paid ? 'border-green-500' : 'border-[#002b5c]'}`}>
                                            <div className="flex flex-col md:flex-row justify-between gap-4">
                                                <div>
                                                    <p className="text-[10px] text-gray-400 font-mono mb-1">#{order.id} | {order.date}</p>
                                                    <h3 className="text-xl font-bold uppercase">{order.customer.n}</h3>
                                                    <p className="text-sm text-gray-600 font-mono">{order.customer.ph} • {order.customer.em}</p>
                                                </div>
                                                <div className="text-right flex flex-col items-end gap-3">
                                                    <div className="flex gap-2">
                                                        <button onClick={() => deleteOrder(order.id)} className="bg-red-500 text-white p-2 rounded-lg hover:bg-red-600 transition-colors"><Icon name="trash-2" size={18} /></button>
                                                        <p className="text-2xl font-bebas text-[#3385ff]">R$ {order.total},00</p>
                                                    </div>
                                                    <div className="flex items-center gap-3 bg-gray-100 px-3 py-2 rounded-full">
                                                        <span className="text-[10px] font-bold uppercase text-gray-500">Pago?</span>
                                                        <button onClick={() => toggleOrderPaid(order.id)} className={`w-12 h-6 rounded-full relative transition-all ${order.paid ? 'bg-green-500' : 'bg-gray-300'}`}><div className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow-md transition-all ${order.paid ? 'left-7' : 'left-1'}`} /></button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="mt-4 pt-4 border-t border-gray-100 grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                {order.items.map((item, i) => (
                                                    <div key={i} className="text-[10px] bg-gray-50 p-2 rounded flex items-center gap-2">
                                                        <img src={item.img} className="w-8 h-8 object-cover rounded" />
                                                        <span>{item.name} <span className="text-gray-400">[{item.color}/{item.size}]</span></span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {isAdminLoginOpen && (
                        <div className="fixed inset-0 z-[6000] flex items-center justify-center p-4 bg-black/95 overlay-fade">
                            <div className="bg-[#0a1428] p-8 rounded-2xl border border-[#3385ff]/20 w-full max-w-sm fade-in">
                                <h2 className="font-bebas text-3xl mb-6 tracking-wide text-center">ADMIN LOGIN</h2>
                                <input type="text" placeholder="Usuário" className="w-full bg-white/5 border border-[#3385ff]/20 p-3 rounded mb-4 outline-none" onChange={e => setAdminUser(e.target.value)} />
                                <input type="password" placeholder="Senha" className="w-full bg-white/5 border border-[#3385ff]/20 p-3 rounded mb-4 outline-none" onChange={e => setAdminPass(e.target.value)} />
                                <button onClick={() => (adminUser === 'canal_jovem' && adminPass === 'canalcamp2K26') ? (setIsAdminLoginOpen(false), window.history.pushState({ modal: 'admin' }, ''), setIsAdminPanelOpen(true)) : alert('Dados incorretos')} className="w-full bg-[#3385ff] text-black py-3 rounded font-bebas text-xl font-bold">ENTRAR</button>
                                <button onClick={closeModal} className="w-full text-white/40 text-xs mt-4">Cancelar</button>
                            </div>
                        </div>
                    )}

                    <a href="https://wa.me/5511919818405" target="_blank" className="fixed bottom-6 right-6 bg-[#25d366] w-14 h-14 rounded-full flex items-center justify-center shadow-lg z-[1500] hover:scale-110 transition-transform active:scale-95"><Icon name="message-circle" size={32} className="text-white" /></a>

                    <footer className="py-20 text-center border-t border-white/5 mt-auto w-full">
                        <div className="h-12 mb-8 flex justify-center">
                            <img src="img/logo.png" alt="Logo" className="h-full object-contain opacity-50" />
                        </div>
                        <div className="flex justify-center gap-4 md:gap-6 mb-10 px-4">
                            <a href="https://instagram.com/canaljovemvsj" target="_blank" className="px-4 py-2 border border-white/10 rounded font-mono text-[9px] md:text-[10px] hover:bg-white hover:text-black transition-all">Instagram VSJ</a>
                            <a href="https://instagram.com/canaljovem.grajau" target="_blank" className="px-4 py-2 border border-white/10 rounded font-mono text-[9px] md:text-[10px] hover:bg-white hover:text-black transition-all">Instagram Grajaú</a>
                        </div>
                        <p className="text-[9px] md:text-[10px] text-[#62768d] font-mono tracking-widest px-4">
                            © Canal Camp - A Escolha 2026 • <span onClick={() => { window.history.pushState({ modal: 'admin-login' }, ''); setIsAdminLoginOpen(true); }} className="cursor-pointer underline hover:text-white transition-colors">ADMIN</span>
                        </p>
                    </footer>
                </div>
            );
        }

        try {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(React.createElement(App));
        } catch (error) {
            console.error('ERRO AO RENDERIZAR:', error);
            document.getElementById('root').innerHTML = `<div style="padding:60px 20px;text-align:center;color:#ff5555;font-family:sans-serif"><h2>Ops... algo deu errado</h2><p>Abra o console (F12)</p><button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#3385ff;color:white;border:none;border-radius:8px;cursor:pointer">Recarregar página</button></div>`;
        }

        window.addEventListener('load', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
