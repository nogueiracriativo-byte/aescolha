<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="img/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/logo.png">
<link rel="apple-touch-icon" href="img/logo.png">
<meta property="og:title" content="Camisetas - A Escolha">
<meta property="og:description" content="Você já fez sua escolha? Uma coleção que une estilo e propósito em peças que falam por você. Descubra agora.">
<meta property="og:image" content="https://aescolha.netlify.app/img/capa_2.jpg">
<meta property="og:url" content="https://aescolha.netlify.app/">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camisetas - A Escolha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family: 'DM Sans', sans-serif; background-color: #050a12; color: #f0f4f8; margin: 0; overflow-x: hidden; width: 100%; }
.font-bebas { font-family: 'Bebas Neue', cursive; }
.font-mono { font-family: 'Space Mono', monospace; }
.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
::selection { background-color: #3385ff; color: white; }
.fade-in { animation: fadeIn 0.3s ease-out forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.slide-in { animation: slideIn 0.3s ease-out forwards; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.overlay-fade { animation: overlayFade 0.3s ease-out forwards; }
@keyframes overlayFade { from { opacity: 0; } to { opacity: 1; } }
.zoom-content { transition: transform 0.3s ease; }
.design-img-wrapper { position: relative; }
.design-img-wrapper::before {
    content: 'ESTAMPA';
    position: absolute;
    top: -10px;
    left: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #3385ff;
    background: #0a1428;
    padding: 0 6px;
    z-index: 10;
}
</style>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                navy: { deep: '#050a12', dark: '#0a1428', main: '#002b5c' },
                accent: '#3385ff',
                gold: '#e2b96a'
            }
        }
    }
}
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    // ============================================================
    // PASSO FINAL: Cole aqui a URL do seu Google Apps Script
    // (começa com https://script.google.com/macros/s/...)
    // ============================================================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzd3GMK6N6MtVCP2dooD1ONrn40LK5jmmlUbW6cmCwJGfBj-perg6XWD7cDf2ayQjs6/exec";

    const Icon = ({ name, size = 24, className = "" }) => {
        useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
        return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
    };

    const NAME_TRANSLATION = {
        '1_reis': '1 Reis 19', 'escolha_obedecer_estonada': 'Escolha Obedecer',
        'escolha_um_lado': 'Escolha Um Lado', 'every_day_is_a_deciosion': 'Every Day is a Decision',
        'if_the_lord_is_god': 'If the Lord is God', 'o_deus_que_sustenta': 'O Deus que Sustenta',
        'o_proximo': 'O Próximo?', 'o_que_fazeis_aqui_estonada': 'O Que Fazes Aqui?',
        'obedeca_o_chamado': 'Obedeça o Chamado', 'quem_vem_depois': 'Quem Vem Depois?',
        'saia_de_cima_do_muro': 'Saia de Cima do Muro', 'who_is_next_estonada': 'Who is Next?'
    };

    const SHIRT_FILES = [
        '1_reis_azul.jpeg', '1_reis_branco.jpeg', '1_reis_preto.jpeg', '1_reis_roxo.jpeg', '1_reis_verde.jpeg',
        'escolha_obedecer_estonada_preto.jpeg', 'escolha_um_lado_offwhite.jpeg', 'escolha_um_lado_preto.jpeg',
        'every_day_is_a_deciosion_azul.jpeg', 'every_day_is_a_deciosion_bege.jpeg', 'every_day_is_a_deciosion_marrom.jpeg',
        'every_day_is_a_deciosion_offwhite.jpeg', 'every_day_is_a_deciosion_preto.jpeg', 'every_day_is_a_deciosion_roxo.jpeg',
        'every_day_is_a_deciosion_verde.jpeg', 'if_the_lord_is_god_offwhite.jpeg', 'o_deus_que_sustenta_bege.jpeg',
        'o_proximo_azul.jpeg', 'o_proximo_marrom.jpeg', 'o_proximo_offwhite.jpeg', 'o_proximo_preto.jpeg', 'o_proximo_verde.jpeg',
        'o_que_fazeis_aqui_estonada_preto.jpeg', 'obedeca_o_chamado_offwhite.jpeg', 'obedeca_o_chamado_preto.jpeg',
        'quem_vem_depois_offwhite.jpeg', 'saia_de_cima_do_muro_offwhite.jpeg', 'who_is_next_estonada_preto.jpeg'
    ];

    const HEX_COLORS = {
        'preto': '#111', 'branco': '#fff', 'azul': '#002b5c', 'roxo': '#5c35b0',
        'verde': '#1b4d3e', 'offwhite': '#f5f5f0', 'bege': '#d2b48c', 'marrom': '#4b3621'
    };

    const MP_LINKS = {
        1: "https://mpago.la/1m71FiX", 2: "https://mpago.la/2xCKdZ7", 3: "https://mpago.la/1Epq5G1",
        4: "https://mpago.la/2bCAh2g", 5: "https://mpago.la/1GcS4Xw", 6: "https://mpago.la/12fY57p",
        7: "https://mpago.la/1kkodB1", 8: "https://mpago.la/2qWh34v", 9: "https://mpago.la/1mDZQkx",
        10: "https://mpago.la/1q7sxky"
    };

    function App() {
        const [products, setProducts] = useState({});
        const [cart, setCart] = useState([]);
        const [activeBanner, setActiveBanner] = useState(0);
        const banners = ["img/capa.jpeg", "img/capa_2.jpg"];

        useEffect(() => {
            const interval = setInterval(() => {
                setActiveBanner(prev => (prev + 1) % banners.length);
            }, 5000);
            return () => clearInterval(interval);
        }, []);

        const [touchStart, setTouchStart] = useState(null);
        const handleTouchStart = (e) => { setTouchStart(e.touches[0].clientX); };
        const handleTouchEnd = (e) => {
            if (!touchStart) return;
            const diff = touchStart - e.changedTouches[0].clientX;
            if (diff > 50) setActiveBanner(prev => (prev + 1) % banners.length);
            else if (diff < -50) setActiveBanner(prev => (prev - 1 + banners.length) % banners.length);
        };

        const [isCartOpen, setIsCartOpen] = useState(false);
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [selectedSize, setSelectedSize] = useState('');
        const [activeImgIdx, setActiveImgIdx] = useState(0);
        const [currentModalImages, setCurrentModalImages] = useState([]);
        const [isAdminLoginOpen, setIsAdminLoginOpen] = useState(false);
        const [isAdminPanelOpen, setIsAdminPanelOpen] = useState(false);
        const [adminUser, setAdminUser] = useState('');
        const [adminPass, setAdminPass] = useState('');
        const [orders, setOrders] = useState([]);
        const [customerInfo, setCustomerInfo] = useState({ n: '', ph: '', em: '' });
        const [checkoutError, setCheckoutError] = useState('');
        const [zoomedImg, setZoomedImg] = useState(null);
        const [designImgError, setDesignImgError] = useState(false);

        useEffect(() => {
            const handlePopState = () => {
                setIsCartOpen(false);
                setSelectedProduct(null);
                setIsAdminLoginOpen(false);
                setIsAdminPanelOpen(false);
                setZoomedImg(null);
                document.body.style.overflow = 'auto';
            };
            window.addEventListener('popstate', handlePopState);
            return () => window.removeEventListener('popstate', handlePopState);
        }, []);

        const closeModal = () => {
            if (window.history.state && window.history.state.modal) {
                window.history.back();
            } else {
                setIsCartOpen(false);
                setSelectedProduct(null);
                setIsAdminLoginOpen(false);
                setIsAdminPanelOpen(false);
                setZoomedImg(null);
                document.body.style.overflow = 'auto';
            }
        };

        useEffect(() => {
            const processed = {};
            SHIRT_FILES.forEach(file => {
                const parts = file.replace('.jpeg', '').split('_');
                const color = parts.pop() || 'padrao';
                const slug = parts.join('_');
                if (!processed[slug]) {
                    processed[slug] = { id: slug, name: NAME_TRANSLATION[slug] || slug.replace(/_/g, ' ').toUpperCase(), variants: [] };
                }
                processed[slug].variants.push({ color, img: `img/${file}` });
            });
            setProducts(processed);
            const savedOrders = localStorage.getItem('camp_orders');
            if (savedOrders) setOrders(JSON.parse(savedOrders));
        }, []);

        const openProductModal = (product) => {
            window.history.pushState({ modal: 'product' }, '');
            setSelectedProduct(product);
            const images = product.variants.map(v => v.img);
            setCurrentModalImages(images);
            setActiveImgIdx(0);
            setSelectedSize('');
            setCheckoutError('');
            setDesignImgError(false);
            document.body.style.overflow = 'hidden';
        };

        const addToCart = () => {
            if (!selectedSize) { setCheckoutError('Por favor, selecione um tamanho.'); return; }
            const activeImg = currentModalImages[activeImgIdx];
            const colorName = selectedProduct.variants.find(v => v.img === activeImg)?.color || "Padrão";
            const newItem = { id: `${selectedProduct.id}-${Date.now()}`, name: selectedProduct.name, size: selectedSize, color: colorName.toUpperCase(), img: activeImg, price: 85 };
            setCart([...cart, newItem]);
            closeModal();
            setTimeout(() => {
                window.history.pushState({ modal: 'cart' }, '');
                setIsCartOpen(true);
            }, 100);
        };

        // ============================================================
        // handleCheckout ATUALIZADO: salva local + envia para Google Sheets
        // ============================================================
        const handleCheckout = () => {
            if (cart.length === 0 || !customerInfo.n || !customerInfo.ph || !customerInfo.em) {
                setCheckoutError('Preencha todos os campos.'); return;
            }
            const newOrder = {
                id: Date.now(),
                date: new Date().toLocaleString('pt-BR'),
                customer: customerInfo,
                items: [...cart],
                total: cart.length * 85,
                paid: false
            };

            // 1. Salva no localStorage (backup local)
            const updatedOrders = [newOrder, ...orders];
            setOrders(updatedOrders);
            localStorage.setItem('camp_orders', JSON.stringify(updatedOrders));

            // 2. Envia para Google Sheets (backup permanente na nuvem)
            if (APPS_SCRIPT_URL !== "COLE_SUA_URL_AQUI") {
                fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newOrder)
                }).catch(err => console.warn('Backup Sheets falhou (pedido salvo localmente):', err));
            }

            // 3. Redireciona para Mercado Pago
            const link = MP_LINKS[cart.length] || MP_LINKS[10];
            window.location.href = link;
        };

        const toggleOrderPaid = (orderId) => {
            const updated = orders.map(o => o.id === orderId ? { ...o, paid: !o.paid } : o);
            setOrders(updated);
            localStorage.setItem('camp_orders', JSON.stringify(updated));
        };

        const deleteOrder = (orderId) => {
            if (window.confirm('Excluir este pedido permanentemente?')) {
                const updated = orders.filter(o => o.id !== orderId);
                setOrders(updated);
                localStorage.setItem('camp_orders', JSON.stringify(updated));
            }
        };

        return (
            <div className="min-h-screen flex flex-col w-full pt-[80px] md:pt-[100px]">
                <nav className="fixed top-0 w-full z-[1000] bg-[#050a12]/95 backdrop-blur-md border-b border-[#3385ff]/20 flex justify-between items-center px-4 md:px-[5%] py-3">
                    <img src="img/logo.png" alt="Logo" className="h-8 md:h-10 object-contain" />
                    <div className="flex items-center gap-2 md:gap-4">
                        <a href="https://forms.gle/wp5moxciPJVzhBx7A" target="_blank" className="bg-[#e2b96a] text-black px-3 py-1.5 md:px-4 md:py-2 rounded-md font-mono text-[9px] md:text-[10px] font-bold hover:brightness-110 transition-all uppercase">INSCREVA-SE NO ACAMPA</a>
                        <button onClick={() => { window.history.pushState({ modal: 'cart' }, ''); setIsCartOpen(true); }} className="bg-[#3385ff]/10 border border-[#3385ff] text-white px-3 py-1.5 md:px-4 md:py-2 rounded-md font-mono text-xs md:text-sm flex items-center gap-2">
                            <Icon name="shopping-cart" size={16} />
                            <span>({cart.length})</span>
                        </button>
                    </div>
                </nav>

                <section className="w-full overflow-hidden relative" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                    <div className="relative w-full aspect-[16/9] bg-black overflow-hidden">
                        {banners.map((banner, index) => (
                            <img key={index} src={banner} className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-700 ${index === activeBanner ? "opacity-100" : "opacity-0"}`} />
                        ))}
                    </div>
                    <button onClick={() => setActiveBanner(prev => (prev - 1 + banners.length) % banners.length)} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full">‹</button>
                    <button onClick={() => setActiveBanner(prev => (prev + 1) % banners.length)} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full">›</button>
                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                        {banners.map((_, index) => (
                            <div key={index} onClick={() => setActiveBanner(index)} className={`w-3 h-3 rounded-full cursor-pointer ${index === activeBanner ? "bg-white" : "bg-white/40"}`} />
                        ))}
                    </div>
                </section>

                <main className="max-w-[1400px] mx-auto px-4 md:px-6 py-8 flex-1 w-full">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                        {Object.values(products).map((product) => (
                            <div key={product.id} onClick={() => openProductModal(product)} className="bg-[#0a1428] border border-[#3385ff]/20 rounded-xl overflow-hidden cursor-pointer group transition-all hover:-translate-y-2">
                                <div className="aspect-square relative overflow-hidden">
                                    <img src={product.variants[0].img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                    <div className="absolute top-3 right-3 bg-[#3385ff] text-black font-mono text-[10px] font-bold px-2 py-1 rounded">
                                        {product.id === '1_reis' ? 'DRY-FIT' : 'OVERSIZED'}
                                    </div>
                                </div>
                                <div className="p-5 text-center">
                                    <h3 className="font-bebas text-2xl tracking-wide">{product.name}</h3>
                                    <p className="text-[#3385ff] font-mono mt-1">R$ 85,00</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </main>

                {selectedProduct && (
                    <div className="fixed inset-0 z-[2000] flex items-center justify-center p-2 md:p-4 bg-black/90 backdrop-blur-sm overlay-fade">
                        <div className="bg-[#0a1428] w-full max-w-6xl rounded-2xl border border-[#3385ff]/20 overflow-hidden flex flex-col md:grid md:grid-cols-[1.3fr_1fr] max-h-[95vh] md:max-h-[90vh] fade-in shadow-2xl">
                            <div className="bg-black relative flex flex-col md:flex-row h-[320px] md:h-full shrink-0 overflow-hidden">
                                <div className="flex md:flex-col gap-2 overflow-x-auto md:overflow-y-auto p-3 bg-black/50 scrollbar-hide border-t md:border-t-0 md:border-r border-white/5 order-2 md:order-1 md:w-24 shrink-0">
                                    {currentModalImages.map((img, i) => (
                                        <img key={i} src={img} onClick={() => setActiveImgIdx(i)} className={`w-12 h-12 md:w-16 md:h-16 object-cover rounded cursor-pointer transition-all shrink-0 ${i === activeImgIdx ? 'ring-2 ring-[#3385ff] opacity-100' : 'opacity-40 hover:opacity-60'}`} />
                                    ))}
                                </div>
                                <div className="flex-1 flex items-center justify-center p-4 overflow-hidden order-1 md:order-2 relative group">
                                    <img src={currentModalImages[activeImgIdx]} className="max-w-full max-h-full object-contain" alt="Preview" />
                                    <button onClick={() => { window.history.pushState({ modal: 'zoom' }, ''); setZoomedImg(currentModalImages[activeImgIdx]); }} className="absolute bottom-4 right-4 bg-white/10 hover:bg-white/20 text-white p-3 rounded-full backdrop-blur-md border border-white/10 transition-colors">
                                        <Icon name="zoom-in" size={20} />
                                    </button>
                                </div>
                                <button onClick={closeModal} className="absolute top-4 right-4 md:hidden bg-black/50 text-white p-2 rounded-full z-10"><Icon name="x" size={20} /></button>
                            </div>
                            <div className="p-6 md:p-10 flex flex-col gap-6 overflow-y-auto scrollbar-hide bg-[#0a1428]">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <div className="flex items-center gap-3">
                                            <h2 className="font-bebas text-3xl md:text-5xl tracking-wide">{selectedProduct.name}</h2>
                                            <span className="bg-[#3385ff] text-black font-mono text-[9px] md:text-[10px] font-bold px-2 py-1 rounded">{selectedProduct.id === '1_reis' ? 'DRY-FIT' : 'OVERSIZED'}</span>
                                        </div>
                                        <p className="text-xl md:text-3xl text-[#3385ff] font-bebas mt-1">R$ 85,00</p>
                                    </div>
                                    <button onClick={closeModal} className="hidden md:block text-white/60 hover:text-white"><I
